services:
  server:
    image: ${SERVER_IMAGE}
    container_name: codeview-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_PORT: ${SERVER_PORT:-3101}
      WEB_ORIGIN: ${WEB_ORIGIN}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/asset-console.db}
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-local-user}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    volumes:
      - ${CODEVIEW_DATA_DIR:-./data}:/app/data
    expose:
      - "3101"

  web:
    image: ${WEB_IMAGE}
    container_name: codeview-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CODEVIEW_HTTP_PORT:-80}:80"
