name: Deploy To ECS With Docker Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/server:${{ github.sha }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/server:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/web:${{ github.sha }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/web:latest

      - name: Package release bundle
        run: git archive --format=tar.gz --output "codeview-${GITHUB_SHA}.tar.gz" HEAD

      - name: Generate production env file
        shell: bash
        env:
          CODEVIEW_HTTP_PORT: ${{ vars.CODEVIEW_HTTP_PORT }}
          CODEVIEW_DATA_DIR: ${{ vars.CODEVIEW_DATA_DIR }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          WEB_ORIGIN: ${{ vars.WEB_ORIGIN }}
          DATABASE_PATH: ${{ vars.DATABASE_PATH }}
          DEFAULT_USER_ID: ${{ vars.DEFAULT_USER_ID }}
          GITHUB_INCLUDE_PRIVATE_REPOS: ${{ vars.GITHUB_INCLUDE_PRIVATE_REPOS }}
          ENCRYPTION_SECRET: ${{ secrets.ENCRYPTION_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CODEVIEW_GITHUB_TOKEN: ${{ secrets.CODEVIEW_GITHUB_TOKEN }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        run: |
          set -euo pipefail

          if [ -z "${WEB_ORIGIN}" ]; then
            echo "WEB_ORIGIN 未配置，请在 GitHub Environment/Repository Variables 中提供 WEB_ORIGIN" >&2
            exit 1
          fi

          if [ -z "${ENCRYPTION_SECRET}" ] || [ -z "${ADMIN_USERNAME}" ] || [ -z "${ADMIN_PASSWORD}" ]; then
            echo "缺少必填 Secrets：ENCRYPTION_SECRET / ADMIN_USERNAME / ADMIN_PASSWORD" >&2
            exit 1
          fi

          cat > deploy.generated.env <<EOF
          CODEVIEW_HTTP_PORT=${CODEVIEW_HTTP_PORT:-81}
          CODEVIEW_DATA_DIR=${CODEVIEW_DATA_DIR:-/var/www/codeview/shared/data}
          SERVER_IMAGE=${ACR_REGISTRY}/${ACR_NAMESPACE}/server:${GITHUB_SHA}
          WEB_IMAGE=${ACR_REGISTRY}/${ACR_NAMESPACE}/web:${GITHUB_SHA}
          SERVER_PORT=${SERVER_PORT:-3101}
          WEB_ORIGIN=${WEB_ORIGIN}
          DATABASE_PATH=${DATABASE_PATH:-/app/data/asset-console.db}
          DEFAULT_USER_ID=${DEFAULT_USER_ID:-local-user}
          ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
          ADMIN_USERNAME=${ADMIN_USERNAME}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          GITHUB_TOKEN=${CODEVIEW_GITHUB_TOKEN}
          GITHUB_INCLUDE_PRIVATE_REPOS=${GITHUB_INCLUDE_PRIVATE_REPOS:-false}
          EOF

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.ECS_PORT }}" "${{ secrets.ECS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          scp -P "${{ secrets.ECS_PORT }}" \
            "codeview-${GITHUB_SHA}.tar.gz" \
            "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/tmp/codeview-${GITHUB_SHA}.tar.gz"

      - name: Upload production env file
        run: |
          scp -P "${{ secrets.ECS_PORT }}" \
            "deploy.generated.env" \
            "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/tmp/codeview-${GITHUB_SHA}.env"

      - name: Deploy on ECS
        run: |
          ssh -p "${{ secrets.ECS_PORT }}" "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" <<EOF
          set -e
          BASE_DIR="/var/www/codeview"
          RELEASE_DIR="\$BASE_DIR/releases/${GITHUB_SHA}"
          SHARED_DIR="\$BASE_DIR/shared"
          CURRENT_LINK="\$BASE_DIR/current"
          mkdir -p "\$RELEASE_DIR" "\$SHARED_DIR/data"
          tar -xzf "/tmp/codeview-${GITHUB_SHA}.tar.gz" -C "\$RELEASE_DIR"
          mv "/tmp/codeview-${GITHUB_SHA}.env" "\$SHARED_DIR/.env"
          ln -sfn "\$RELEASE_DIR" "\$CURRENT_LINK"
          docker login \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}" \
            "${{ secrets.ACR_REGISTRY }}"
          docker compose \
            --project-name codeview \
            --file "\$CURRENT_LINK/compose.yaml" \
            --env-file "\$SHARED_DIR/.env" \
            pull
          docker compose \
            --project-name codeview \
            --file "\$CURRENT_LINK/compose.yaml" \
            --env-file "\$SHARED_DIR/.env" \
            up -d
          mapfile -t RELEASE_DIRS < <(ls -1dt "\$BASE_DIR"/releases/* 2>/dev/null || true)
          if [ "\${#RELEASE_DIRS[@]}" -gt 2 ]; then
            for OLD_RELEASE in "\${RELEASE_DIRS[@]:2}"; do
              if [ -d "\$OLD_RELEASE" ]; then
                find "\$OLD_RELEASE" -mindepth 1 -depth -delete
                rmdir "\$OLD_RELEASE"
              fi
            done
          fi
          EOF
