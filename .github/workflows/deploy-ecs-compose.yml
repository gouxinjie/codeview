name: Deploy To ECS With Docker Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/server:${{ github.sha }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/server:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/web:${{ github.sha }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/web:latest

      - name: Package release bundle
        run: git archive --format=tar.gz --output "codeview-${GITHUB_SHA}.tar.gz" HEAD

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.ECS_PORT }}" "${{ secrets.ECS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          scp -P "${{ secrets.ECS_PORT }}" \
            "codeview-${GITHUB_SHA}.tar.gz" \
            "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/tmp/codeview-${GITHUB_SHA}.tar.gz"

      - name: Deploy on ECS
        run: |
          ssh -p "${{ secrets.ECS_PORT }}" "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" <<EOF
          set -e
          BASE_DIR="/var/www/codeview"
          RELEASE_DIR="\$BASE_DIR/releases/${GITHUB_SHA}"
          SHARED_DIR="\$BASE_DIR/shared"
          CURRENT_LINK="\$BASE_DIR/current"
          mkdir -p "\$RELEASE_DIR" "\$SHARED_DIR/data"
          tar -xzf "/tmp/codeview-${GITHUB_SHA}.tar.gz" -C "\$RELEASE_DIR"
          ln -sfn "\$RELEASE_DIR" "\$CURRENT_LINK"
          docker login \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}" \
            "${{ secrets.ACR_REGISTRY }}"
          docker compose \
            --project-name codeview \
            --file "\$CURRENT_LINK/compose.yaml" \
            --env-file "\$SHARED_DIR/.env" \
            pull
          docker compose \
            --project-name codeview \
            --file "\$CURRENT_LINK/compose.yaml" \
            --env-file "\$SHARED_DIR/.env" \
            up -d
          mapfile -t RELEASE_DIRS < <(ls -1dt "\$BASE_DIR"/releases/* 2>/dev/null || true)
          if [ "\${#RELEASE_DIRS[@]}" -gt 2 ]; then
            for OLD_RELEASE in "\${RELEASE_DIRS[@]:2}"; do
              if [ -d "\$OLD_RELEASE" ]; then
                find "\$OLD_RELEASE" -mindepth 1 -depth -delete
                rmdir "\$OLD_RELEASE"
              fi
            done
          fi
          EOF
